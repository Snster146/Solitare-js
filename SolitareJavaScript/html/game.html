<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JS Solitaire</title>
    <link rel="stylesheet" href="../css/game.css">
</head>

<body>

<main class="game">

    <section class="top-row">
<!-- STOCK AREA -->
        <div class="stock-area">
            <div class="card stock">
                <div class="card-another" id="card-stock1"><img src="../images/pixelart/back_card.png" onerror=></div>    
            </div>
            <div class="card waste">
                <div class="card-another" id="card-stock2"><img id="card-stock2_img" src="../images/00_kerenel_Cards.png" ></div>    
            </div>
        </div>
<!-- FOUNDATION AREA -->
        <div class="foundation-area">
            <div class="card foundation">
                <div class="card-another"><img src="" id="foundation-1"></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" id="foundation-2" ></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" id="foundation-3" ></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" id="foundation-4" ></div>    

            </div>
        </div>

        

    </section>
    <section class="bottom-row">
<!-- TABLEAU AREA -->

        <div class="tableau-area">
<!-- FOUNDATION 1 -->
            <div class="card foundation" id="tableau-1">
                <div class="card-another" ><img src="" id="card-tableau-1-1"></div>    

            </div>
<!-- FOUNDATION 2 -->
        
            <div class="card foundation" id="tableau-2">
                
                <div class="card-another" ><img id="card-tableau-2-1"  src=""  ></div>    
                <div class="card-another" ><img src="" id="card-tableau-2-2" ></div>    
            </div>
<!-- FOUNDATION 3 -->

            <div class="card foundation" id="tableau-3">
                <div class="card-another" ><img src="" id="card-tableau-3-1" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-3-2" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-3-3"></div>    
            </div>
<!-- FOUNDATION 4 -->
            <div class="card foundation" id="tableau-4">
                <div class="card-another" ><img src="" id="card-tableau-4-1"></div>    
                <div class="card-another" ><img src="" id="card-tableau-4-2" ></div>    
                <div class="card-another" ><img src=""id="card-tableau-4-3" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-4-4" ></div>    
            </div>
<!-- FOUNDATION 5 -->
            <div class="card foundation" id="tableau-5">
                <div class="card-another"><img src="" id="card-tableau-5-1" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-5-2" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-5-3" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-5-4" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-5-5" ></div>    
            </div>
<!-- FOUNDATION 6 -->
            <div class="card foundation" id="tableau-6">
                <div class="card-another" ><img src="" id="card-tableau-6-1"  > </div>    
                <div class="card-another" ><img src="" id="card-tableau-6-2" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-6-3"></div>    
                <div class="card-another" ><img src="" id="card-tableau-6-4"></div>    
                <div class="card-another" ><img src="" id="card-tableau-6-5"></div>    
                <div class="card-another" ><img src="" id="card-tableau-6-6"></div>    
            </div>
<!-- FOUNDATION 7 -->
            <div class="card foundation" id="tableau-7">
                <div class="card-another" ><img src="" id="card-tableau-7-1" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-2" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-3" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-4"></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-5" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-6" ></div>    
                <div class="card-another" ><img src="" id="card-tableau-7-7"></div>    

            </div>
        </div>

    </section>
    
    <footer>
        <div class = "timer">
           <p id="timer-id"> Time :</p>
        </div>
        <div class = "moves">
           <p> Moves :</p>
        </div>
        <button class="go-back-btn"><a href= "../html/index.html"></a>go home</button>

    </footer>
    <p id="debug-label">hi</p>
</main>
    <script type="module" src="../JavaScript/Game.js"></script>

</html>
