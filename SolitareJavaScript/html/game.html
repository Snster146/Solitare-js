<!DOCTYPE html>
<html lang="en">
<head>

    <title>JS Solitaire</title>
    <link rel="stylesheet" href="../css/game.css">
</head>

<body>

<main class="game">

    <section class="top-row">
<!-- STOCK AREA -->
        <div class="stock-area">
            <div class="card stock">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    
            </div>
            <div class="card waste">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    
            </div>
        </div>
<!-- FOUNDATION AREA -->
        <div class="foundation-area">
            <div class="card foundation">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    

            </div>
            <div class="card foundation">
                <div class="card-another"><img src="" onerror="this.style.display='none'"></div>    

            </div>
        </div>

        

    </section>
    <section class="bottom-row">
<!-- TABLEAU AREA -->

        <div class="tableau-area">
<!-- FOUNDATION 1 -->
            <div class="card foundation" id="foundation-1">

            </div>
<!-- FOUNDATION 4 -->

                <div class="card-another" ><img src="" id="card-foundation-6-2" ></div>
